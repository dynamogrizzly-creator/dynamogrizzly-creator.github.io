---
layout: default
---
<article class="post-content">
  <div class="container">
    <div class="post-header" data-reveal>
      {% if page.category %}<span class="section-tag">{{ page.category }}</span>{% endif %}
      <h1>{{ page.title }}</h1>
      <div class="divider"></div>
      <div class="post-meta">
        <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%d %B %Y" }}</time>
        {% if page.author %} · {{ page.author }}{% endif %}
      </div>
    </div>
    {% if page.image %}
    <div class="post-hero-image" data-reveal>
      <img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" loading="lazy">
    </div>
    {% endif %}
    <div class="post-body" data-reveal>
      {{ content }}
    </div>
    <div class="post-footer" data-reveal>
      <a href="{{ site.baseurl }}/news/" class="btn btn-outline">← Tutte le news</a>
    </div>
  </div>
</article>
