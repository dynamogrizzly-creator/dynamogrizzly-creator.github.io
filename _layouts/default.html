<!DOCTYPE html>
<html lang="it" prefix="og: https://ogp.me/ns#">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ═══ SEO PRIMARIO ═══ -->
  <title>{% if page.title %}{{ page.title }} | Ravenna Grizzlies{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% if page.keywords %}
  <meta name="keywords" content="{{ page.keywords }}">{% endif %}
  <meta name="author" content="{{ site.author.name }}">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#7B2FBE">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- ═══ GOOGLE SEARCH CONSOLE ═══ -->
  <meta name="google-site-verification" content="{{ site.google_site_verification }}" />

  <!-- ═══ GOOGLE ANALYTICS ═══ -->
  <script>
    window.addEventListener('load', function () {
      var s = document.createElement('script');
      s.src = 'https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}';
      s.async = true;
      document.head.appendChild(s);
    });
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>

  <!-- ═══ OPEN GRAPH ═══ -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image"
    content="{{ site.url }}{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.og_image }}{% endif %}">
  <meta property="og:locale" content="it_IT">
  <meta property="og:site_name" content="Ravenna Grizzlies – Dodgeball Ravenna">

  <!-- ═══ TWITTER CARD ═══ -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image"
    content="{{ site.url }}{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.og_image }}{% endif %}">

  <!-- ═══ SCHEMA MARKUP JSON-LD ═══ -->
  {% if page.schema %}{{ page.schema }}{% else %}{% include schema-org.html %}{% endif %}

  <!-- ═══ FAVICON ═══ -->
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/images/logoOriginal.png">

  {% if page.url == "/" %}
  <link rel="preload" as="image" href="{{ site.baseurl }}/assets/images/logo.webp" fetchpriority="high"
    type="image/webp">
  {% endif %}

  {% if page.hero_image %}
  <link rel="preload" as="image" href="{{ site.baseurl }}{{ page.hero_image }}" fetchpriority="high" type="image/webp">
  {% endif %}
  <!-- ═══ FONT & CSS ═══ -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>

<body>

  {% include navbar.html %}

  {{ content }}

  {% include footer.html %}

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>

</html>
